worker_processes 1;
daemon off;
pid /home/ubuntu/transparent-offload/transparent-runtime/sweep/ng/nginx.pid;
error_log /home/ubuntu/transparent-offload/transparent-runtime/sweep/ng/logs/error.log;
events { worker_connections 256; }
thread_pool tp threads=4;
http {
  access_log off;
  client_body_temp_path /home/ubuntu/transparent-offload/transparent-runtime/sweep/ng/temp;
  server {
    listen 7713;
    root /home/ubuntu/transparent-offload/transparent-runtime/sweep/ng/html;
    location / { aio threads=tp; }
  }
}
