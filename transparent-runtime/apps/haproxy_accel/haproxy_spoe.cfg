global
    nbthread 4
defaults
    mode http
    timeout connect 5s
    timeout client  30s
    timeout server  30s
frontend f
    bind 127.0.0.1:7810
    filter spoe engine offload-engine config /home/ubuntu/transparent-offload/transparent-runtime/apps/haproxy_accel/spoe.conf
    http-request return status 200 content-type "text/plain" string "OK"
backend spoe-backend
    mode tcp
    server agent 127.0.0.1:9002
