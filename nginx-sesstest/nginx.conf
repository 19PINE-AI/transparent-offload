worker_processes 1;
daemon on;
pid /home/ubuntu/transparent-offload/nginx-sesstest/nginx.pid;
error_log /home/ubuntu/transparent-offload/nginx-sesstest/logs/error.log;
events { worker_connections 1024; }
http {
  access_log off;
  client_body_temp_path /home/ubuntu/transparent-offload/nginx-sesstest/logs/client_body;
  proxy_temp_path /home/ubuntu/transparent-offload/nginx-sesstest/logs/proxy;
  fastcgi_temp_path /home/ubuntu/transparent-offload/nginx-sesstest/logs/fastcgi;
  uwsgi_temp_path /home/ubuntu/transparent-offload/nginx-sesstest/logs/uwsgi;
  scgi_temp_path /home/ubuntu/transparent-offload/nginx-sesstest/logs/scgi;
  server {
    listen 8443 ssl;
    ssl_certificate /home/ubuntu/transparent-offload/nginx-sesstest/cert.pem;
    ssl_certificate_key /home/ubuntu/transparent-offload/nginx-sesstest/key.pem;
    ssl_protocols TLSv1.2;
    ssl_session_cache builtin:2000;     # OpenSSL INTERNAL session cache
    ssl_session_tickets off;            # force stateful session-ID resumption -> uses the cache
    ssl_session_timeout 10m;
    location / { return 200 "ok\n"; }
  }
}
